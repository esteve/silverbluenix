modules:
  - type: files
    files:
      - source: system/usr/lib/systemd/system/nix-daemon.service.d/override.conf
        destination: /usr/lib/systemd/system/nix-daemon.service.d/override.conf
      - source: system/usr/lib/systemd/system/nix.mount
        destination: /usr/lib/systemd/system/nix.mount

  - type: dnf
    install:
      packages:
        - nix

  - type: script
    snippets:
      - "echo L+ /run/opengl-driver - - - - $(nix path-info --json nixpkgs#mesa 2> /dev/null| jq -r 'keys[0]') > /usr/lib/tmpfiles.d/nix-opengl-driver.conf"
      - "rm -rf /nix"
      - "mkdir -p /nix"

  - type: systemd
    system:
      enabled:
        - nix.mount
        - nix-daemon.service
